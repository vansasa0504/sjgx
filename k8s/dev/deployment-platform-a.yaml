apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-a
  namespace: sjgx-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sjgx-platform
      site: a
  template:
    metadata:
      labels:
        app: sjgx-platform
        site: a
    spec:
      containers:
        - name: gateway
          image: ${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: sjgx-config
          env:
            - name: ACTIVE_SITE
              value: a
            - name: SERVER_PORT
              value: "8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
