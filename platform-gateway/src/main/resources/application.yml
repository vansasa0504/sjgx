spring:
  application:
    name: platform-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*}
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: platform-auth
          uri: lb://platform-auth
          predicates:
            - Path=/auth/**,/users/**,/roles/**,/permissions/**
        - id: platform-partner
          uri: lb://platform-partner
          predicates:
            - Path=/api/v1/partners/**
        - id: platform-pipeline
          uri: lb://platform-pipeline
          predicates:
            - Path=/api/v1/ingest/**
  flyway:
    enabled: ${FLYWAY_ENABLED:false}

sentinel:
  rules:
    - path: /api/v1/ingest/**
      qps: ${SENTINEL_INGEST_QPS:100}
