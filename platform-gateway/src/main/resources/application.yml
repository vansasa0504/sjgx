spring:
  application:
    name: platform-gateway
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*}
            allowed-methods: "*"
            allowed-headers: "*"
      routes:
        - id: platform-auth
          uri: ${PLATFORM_AUTH_URI:http://localhost:8081}
          predicates:
            - Path=/auth/**,/users/**,/roles/**,/permissions/**
        - id: platform-partner
          uri: ${PLATFORM_PARTNER_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/partners/**,/api/v1/consumers/**
        - id: platform-pipeline
          uri: ${PLATFORM_PIPELINE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/ingest/**,/api/v1/services/**,/api/v1/catalog/**
        - id: platform-quality
          uri: ${PLATFORM_QUALITY_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/quality/**
        - id: platform-billing
          uri: ${PLATFORM_BILLING_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/billing/**,/api/v1/stats/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:64}
          max-idle: ${REDIS_POOL_MAX_IDLE:32}
          min-idle: ${REDIS_POOL_MIN_IDLE:8}
          max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}
  flyway:
    enabled: ${FLYWAY_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

sentinel:
  rules:
    - path: /api/v1/ingest/**
      qps: ${SENTINEL_INGEST_QPS:100}
    - path: /api/v1/services/**
      qps: ${SENTINEL_SERVICE_QPS:1000}
    - path: /auth/**
      qps: ${SENTINEL_AUTH_QPS:100}
  gateway-flow-rules:
    default-qps: ${SENTINEL_DEFAULT_QPS:500}
    service-invoke-qps: ${SENTINEL_SERVICE_INVOKE_QPS:1000}
    auth-qps: ${SENTINEL_AUTH_QPS:100}
