spring:
  application:
    name: platform-pipeline
  datasource:
    url: ${PIPELINE_DB_URL:jdbc:mysql://localhost:3306/sjgx}
    username: ${PIPELINE_DB_USERNAME:root}
    password: ${PIPELINE_DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration,filesystem:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${PIPELINE_INVOKE_LOG_GROUP:platform-pipeline}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

ingest:
  http:
    connect-timeout-seconds: ${INGEST_HTTP_CONNECT_TIMEOUT_SECONDS:3}
    request-timeout-seconds: ${INGEST_HTTP_REQUEST_TIMEOUT_SECONDS:10}
storage:
  data-asset:
    sm4-key: ${DATA_ASSET_SM4_KEY:0123456789abcdef}
  minio:
    enabled: ${MINIO_ENABLED:false}
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:sjgx-cold-storage}

pipeline:
  invoke-log:
    kafka-enabled: ${PIPELINE_INVOKE_LOG_KAFKA_ENABLED:false}
    topic: ${PIPELINE_INVOKE_LOG_TOPIC:service-invoke-logs}
    group-id: ${PIPELINE_INVOKE_LOG_GROUP:platform-pipeline}

platform:
  db:
    type: ${DB_TYPE:MYSQL}
  redis:
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:32}
        max-idle: ${REDIS_POOL_MAX_IDLE:16}
        min-idle: ${REDIS_POOL_MIN_IDLE:4}
        max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}

