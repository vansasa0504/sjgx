spring:
  application:
    name: platform-auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/sjgx}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration,filesystem:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-env}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
