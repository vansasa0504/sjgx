server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info

spring:
  application:
    name: platform-auth
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://localhost:3306/sjgx}
    username: ${AUTH_DB_USERNAME:root}
    password: ${AUTH_DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration,filesystem:db/migration
    baseline-on-migrate: true

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-env}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}

platform:
  db:
    type: ${DB_TYPE:MYSQL}
  redis:
    lettuce:
      pool:
        max-active: ${REDIS_POOL_MAX_ACTIVE:32}
        max-idle: ${REDIS_POOL_MAX_IDLE:16}
        min-idle: ${REDIS_POOL_MIN_IDLE:4}
        max-wait: ${REDIS_POOL_MAX_WAIT_MS:2000}

